<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agribathi & Badam Malt Orders</title>
  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success px-3">
  <a class="navbar-brand fw-bold" href="#">
    <i class="bi bi-shop"></i> Agribathi Orders
  </a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navMenu">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item">
        <a class="nav-link" href="#" data-view="order-form" id="nav-order-form">
          <i class="bi bi-plus-circle"></i> New Order
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#" data-view="order-history" id="nav-order-history">
          <i class="bi bi-clock-history"></i> Order History
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#" data-view="dashboard" id="nav-dashboard">
          <i class="bi bi-speedometer2"></i> Dashboard
        </a>
      </li>
    </ul>
  </div>
</nav>

<!-- Toast container -->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
  <div id="app-toast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="toast-body"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Main content area -->
<div class="container-fluid py-4" id="view-container">
  <div class="text-center py-5 text-muted">
    <div class="spinner-border" role="status"></div>
    <p class="mt-2">Loading...</p>
  </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- App scripts -->
<script src="js/api.js"></script>
<script src="js/orderForm.js"></script>
<script src="js/orderHistory.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/app.js"></script>

</body>
</html>
